<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>More Than Momentum</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      max-width: 100vw;
      height: 100%;
      background: #0C0C0C;
      overflow: hidden;
    }

    .stage {
      position: fixed;
      inset: 0;
      width: 100%;
      max-width: 100vw;
      box-sizing: border-box;
      padding: 0 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .logo {
      width: clamp(100px, 25vw, 200px);
      height: auto;
      display: block;
      opacity: 0;
      transform: scale(0.92);
      transition: opacity 400ms ease, transform 400ms ease;
    }
    .logo.visible {
      opacity: 1;
      transform: scale(1);
    }

    .accent {
      width: 0;
      height: 2px;
      background: #2D6BE4;
      margin-top: -70px;
      transition: width 300ms ease;
    }
    .accent.visible {
      width: clamp(32px, 6vw, 48px);
    }

    .wordmark {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 800;
      font-size: clamp(24px, 7vw, 48px);
      color: #FFFFFF;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      line-height: 1;
      text-align: center;
      opacity: 0;
      transform: translateY(12px);
      transition: opacity 400ms ease, transform 400ms ease;
    }
    .wordmark.visible {
      opacity: 1;
      transform: translateY(0);
    }

    #overlay {
      position: fixed;
      inset: 0;
      background: #0C0C0C;
      opacity: 0;
      pointer-events: none;
      transition: opacity 500ms ease;
    }
    #overlay.visible {
      opacity: 1;
    }
  </style>
</head>
<body>
  <div class="stage">
    <img id="logo" class="logo" src="/images/whiteguylogo.png" alt="More Than Momentum">
    <div id="accent" class="accent"></div>
    <div id="wordmark" class="wordmark">More Than Momentum</div>
  </div>
  <div id="overlay"></div>

  <script>
    function runIntro() {
      var logo = document.getElementById('logo');
      var accent = document.getElementById('accent');
      var wordmark = document.getElementById('wordmark');
      var overlay = document.getElementById('overlay');

      setTimeout(function () { logo.classList.add('visible'); }, 100);
      setTimeout(function () { accent.classList.add('visible'); }, 400);
      setTimeout(function () { wordmark.classList.add('visible'); }, 600);
      setTimeout(function () { overlay.classList.add('visible'); }, 2200);
      setTimeout(function () { window.location.href = '/links.html'; }, 2700);
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', runIntro);
    } else {
      runIntro();
    }
  </script>
</body>
</html>
