<header class="cs-view-header">
  <div>
    <h1 class="cs-view-title">This Week</h1>
    <div class="cs-view-sub">7-day plan · Strategist runs Sundays at 4pm ET · approve, edit, ship</div>
  </div>
</header>

<div class="cs-tw-toolbar">
  <div class="cs-tw-week-nav">
    <button class="cs-tw-week-btn" data-tw-week="prev"  aria-label="Previous week">‹</button>
    <span class="cs-tw-week-label" id="cs-tw-week-label">—</span>
    <button class="cs-tw-week-btn" data-tw-week="next"  aria-label="Next week">›</button>
    <button class="cs-tw-week-btn" data-tw-week="today" aria-label="Jump to current week">Today</button>
  </div>
  <button class="cs-tw-action" id="cs-tw-generate">Generate This Week</button>
  <button class="cs-tw-action is-secondary" id="cs-tw-approve-all">Approve All</button>
</div>

<div id="cs-tw-cascade-banner" hidden></div>

<div id="cs-tw-strategy" class="cs-tw-summary" hidden>
  <div class="cs-tw-summary-head" data-tw-toggle="strategy">
    <span>Strategy Summary</span>
    <span class="cs-tw-summary-chev">▾</span>
  </div>
  <div class="cs-tw-summary-body"></div>
</div>

<div id="cs-tw-monday-brief"    class="cs-tw-brief" hidden></div>
<div id="cs-tw-wednesday-brief" class="cs-tw-brief" hidden></div>

<div id="cs-tw-body">
  <div class="cs-loading"><div class="cs-spinner"></div><p>Loading plan…</p></div>
</div>

<aside class="cs-tw-side" id="cs-tw-side" aria-hidden="true"></aside>
